<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Link - Environnement de Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 24px;
        }

        .user-info {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .user-badge {
            background: #667eea;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
        }

        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .logout-btn:hover {
            background: #c0392b;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            max-width: 500px;
            margin: 100px auto;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .login-container h2 {
            color: #667eea;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #5568d3;
        }

        .btn-secondary {
            background: #95a5a6;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 20px;
        }

        .sidebar {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            height: fit-content;
        }

        .sidebar h3 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .menu-item {
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            color: #333;
            text-decoration: none;
            display: block;
        }

        .menu-item:hover {
            background: #f0f0f0;
        }

        .menu-item.active {
            background: #667eea;
            color: white;
        }

        .content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            min-height: 600px;
        }

        .content h2 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .card h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .card p {
            color: #666;
            margin-bottom: 5px;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .table th,
        .table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .table th {
            background: #667eea;
            color: white;
            font-weight: 600;
        }

        .table tr:hover {
            background: #f8f9fa;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success {
            background: #2ecc71;
            color: white;
        }

        .badge-warning {
            background: #f39c12;
            color: white;
        }

        .badge-danger {
            background: #e74c3c;
            color: white;
        }

        .badge-info {
            background: #3498db;
            color: white;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .hidden {
            display: none;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .stat-card p {
            font-size: 14px;
            opacity: 0.9;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: inline-block;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .file-input-label:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header" id="header">
            <h1>🔒 Secure Link - Environnement de Test</h1>
            <div class="user-info" id="userInfo" style="display: none;">
                <span class="user-badge" id="userBadge"></span>
                <button class="logout-btn" onclick="logout()">Déconnexion</button>
            </div>
        </div>

        <!-- Login Screen -->
        <div id="loginScreen" class="login-container">
            <h2>Connexion</h2>
            <div id="loginAlert"></div>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Type d'utilisateur</label>
                    <select id="userType" onchange="updateLoginForm()">
                        <option value="admin">Administrateur</option>
                        <option value="organisation">Organisation</option>
                        <option value="client">Client</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn">Se connecter</button>
            </form>
            <div style="margin-top: 20px; text-align: center;">
                <p style="color: #666; font-size: 14px;">
                    <strong>Comptes de test par défaut :</strong><br>
                    Admin: admin@securelink.com / Admin123!<br>
                    (Créez vos propres comptes via l'API)
                </p>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="hidden">
            <div class="dashboard">
                <!-- Sidebar -->
                <div class="sidebar">
                    <h3>Menu</h3>
                    <div id="menuItems"></div>
                </div>

                <!-- Content -->
                <div class="content">
                    <div id="contentArea">
                        <div class="loading">Chargement...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api';
        let currentUser = null;
        let currentToken = null;
        let currentRole = null;

        // Initialisation
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
        });

        function checkAuth() {
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            if (token && user) {
                currentToken = token;
                currentUser = JSON.parse(user);
                currentRole = currentUser.role;
                showDashboard();
            } else {
                showLogin();
            }
        }

        function showLogin() {
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('userInfo').style.display = 'none';
        }

        function showDashboard() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('userBadge').textContent = `${currentUser.role} - ${currentUser.email}`;
            loadMenu();
            loadDefaultView();
        }

        function updateLoginForm() {
            const userType = document.getElementById('userType').value;
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            
            if (userType === 'admin') {
                emailInput.value = 'admin@securelink.com';
                passwordInput.value = 'Admin123!';
            } else {
                emailInput.value = '';
                passwordInput.value = '';
            }
        }

        async function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const userType = document.getElementById('userType').value;

            let endpoint = '/auth/login';
            if (userType === 'client') {
                endpoint = '/auth/login/client';
            }

            try {
                const response = await fetch(`${API_BASE}${endpoint}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password }),
                });

                const data = await response.json();

                if (response.ok) {
                    currentToken = data.access_token;
                    currentUser = {
                        email: data.user.email,
                        role: data.user.role,
                        userId: data.user.id,
                        organisationId: data.user.organisationId,
                        organisationRole: data.user.organisationRole,
                    };
                    localStorage.setItem('token', currentToken);
                    localStorage.setItem('user', JSON.stringify(currentUser));
                    currentRole = currentUser.role;
                    showDashboard();
                } else {
                    showAlert('loginAlert', data.message || 'Erreur de connexion', 'error');
                }
            } catch (error) {
                showAlert('loginAlert', 'Erreur de connexion au serveur', 'error');
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            currentToken = null;
            currentUser = null;
            currentRole = null;
            showLogin();
        }

        function loadMenu() {
            const menuItems = document.getElementById('menuItems');
            menuItems.innerHTML = '';

            const menus = {
                ADMIN: [
                    { id: 'organisations', label: '🏢 Organisations', icon: '🏢' },
                    { id: 'users', label: '👥 Utilisateurs', icon: '👥' },
                    { id: 'forms', label: '📝 Formulaires', icon: '📝' },
                    { id: 'documentTypes', label: '📄 Types de Documents', icon: '📄' },
                    { id: 'requests', label: '📋 Demandes', icon: '📋' },
                    { id: 'verifications', label: '✅ Vérifications', icon: '✅' },
                    { id: 'settings', label: '⚙️ Paramètres', icon: '⚙️' },
                    { id: 'security', label: '🔒 Sécurité', icon: '🔒' },
                    { id: 'audit', label: '📊 Audit Logs', icon: '📊' },
                    { id: 'statistics', label: '📈 Statistiques', icon: '📈' },
                ],
                ORGANISATION: [
                    { id: 'requests', label: '📋 Demandes', icon: '📋' },
                    { id: 'verifications', label: '✅ Vérifications', icon: '✅' },
                    { id: 'users', label: '👥 Employés', icon: '👥' },
                    { id: 'forms', label: '📝 Formulaires', icon: '📝' },
                    { id: 'statistics', label: '📈 Statistiques', icon: '📈' },
                ],
                CLIENT: [
                    { id: 'profile', label: '👤 Mon Profil', icon: '👤' },
                    { id: 'documents', label: '📄 Mes Documents', icon: '📄' },
                    { id: 'requests', label: '📋 Mes Demandes', icon: '📋' },
                    { id: 'createRequest', label: '➕ Nouvelle Demande', icon: '➕' },
                    { id: 'archives', label: '📁 Archives', icon: '📁' },
                    { id: 'notifications', label: '🔔 Notifications', icon: '🔔' },
                ],
            };

            const menu = menus[currentRole] || [];
            menu.forEach(item => {
                const menuItem = document.createElement('a');
                menuItem.className = 'menu-item';
                menuItem.href = '#';
                menuItem.textContent = item.label;
                menuItem.onclick = (e) => {
                    e.preventDefault();
                    document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
                    menuItem.classList.add('active');
                    loadView(item.id);
                };
                menuItems.appendChild(menuItem);
            });
        }

        function loadDefaultView() {
            const defaultViews = {
                ADMIN: 'statistics',
                ORGANISATION: 'requests',
                CLIENT: 'profile',
            };
            loadView(defaultViews[currentRole] || 'profile');
        }

        async function loadView(viewId) {
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = '<div class="loading">Chargement...</div>';

            try {
                switch (viewId) {
                    case 'organisations':
                        await loadOrganisations();
                        break;
                    case 'users':
                        await loadUsers();
                        break;
                    case 'forms':
                        await loadForms();
                        break;
                    case 'documentTypes':
                        await loadDocumentTypes();
                        break;
                    case 'requests':
                        await loadRequests();
                        break;
                    case 'verifications':
                        await loadVerifications();
                        break;
                    case 'settings':
                        await loadSettings();
                        break;
                    case 'security':
                        await loadSecurity();
                        break;
                    case 'audit':
                        await loadAuditLogs();
                        break;
                    case 'statistics':
                        await loadStatistics();
                        break;
                    case 'profile':
                        await loadProfile();
                        break;
                    case 'documents':
                        await loadDocuments();
                        break;
                    case 'createRequest':
                        await loadCreateRequest();
                        break;
                    case 'archives':
                        await loadArchives();
                        break;
                    case 'notifications':
                        await loadNotifications();
                        break;
                    default:
                        contentArea.innerHTML = '<h2>Vue non disponible</h2>';
                }
            } catch (error) {
                contentArea.innerHTML = `<div class="alert alert-error">Erreur: ${error.message}</div>`;
            }
        }

        // API Helper
        async function apiCall(endpoint, options = {}) {
            const response = await fetch(`${API_BASE}${endpoint}`, {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${currentToken}`,
                    ...options.headers,
                },
            });

            if (response.status === 401) {
                logout();
                throw new Error('Session expirée');
            }

            const data = await response.json();
            if (!response.ok) {
                throw new Error(data.message || 'Erreur API');
            }

            return data;
        }

        function showAlert(containerId, message, type = 'info') {
            const container = document.getElementById(containerId);
            container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }

        // Views
        async function loadStatistics() {
            const data = await apiCall('/requests/statistics');
            const content = `
                <h2>📈 Statistiques</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>${data.total || 0}</h3>
                        <p>Total Demandes</p>
                    </div>
                    <div class="stat-card">
                        <h3>${data.pending || 0}</h3>
                        <p>En Attente</p>
                    </div>
                    <div class="stat-card">
                        <h3>${data.inProgress || 0}</h3>
                        <p>En Cours</p>
                    </div>
                    <div class="stat-card">
                        <h3>${data.validated || 0}</h3>
                        <p>Validées</p>
                    </div>
                    <div class="stat-card">
                        <h3>${data.rejected || 0}</h3>
                        <p>Rejetées</p>
                    </div>
                </div>
            `;
            document.getElementById('contentArea').innerHTML = content;
        }

        async function loadOrganisations() {
            const data = await apiCall('/organisations');
            let html = '<h2>🏢 Organisations</h2><button class="btn" onclick="showCreateOrganisation()" style="margin-bottom: 20px;">➕ Créer une organisation</button>';
            
            if (data.length === 0) {
                html += '<p>Aucune organisation</p>';
            } else {
                html += '<table class="table"><thead><tr><th>Nom</th><th>Secteur</th><th>Email Admin</th><th>Statut</th><th>Actions</th></tr></thead><tbody>';
                data.forEach(org => {
                    html += `
                        <tr>
                            <td>${org.name}</td>
                            <td>${org.sector}</td>
                            <td>${org.adminEmail || 'N/A'}</td>
                            <td><span class="badge ${org.isActive ? 'badge-success' : 'badge-danger'}">${org.isActive ? 'Actif' : 'Inactif'}</span></td>
                            <td><button class="btn btn-secondary" onclick="viewOrganisation('${org.id}')">Voir</button></td>
                        </tr>
                    `;
                });
                html += '</tbody></table>';
            }
            
            document.getElementById('contentArea').innerHTML = html;
        }

        async function loadUsers() {
            let endpoint = '/users';
            if (currentRole === 'ORGANISATION') {
                endpoint = `/organisations/${currentUser.organisationId}/employees`;
            }
            
            const data = await apiCall(endpoint);
            let html = '<h2>👥 Utilisateurs</h2>';
            
            if (currentRole === 'ADMIN') {
                html += '<button class="btn" onclick="showCreateUser()" style="margin-bottom: 20px;">➕ Créer un utilisateur</button>';
            }
            
            if (data.length === 0) {
                html += '<p>Aucun utilisateur</p>';
            } else {
                html += '<table class="table"><thead><tr><th>Nom</th><th>Email</th><th>Rôle</th><th>Statut</th></tr></thead><tbody>';
                data.forEach(user => {
                    html += `
                        <tr>
                            <td>${user.name || user.firstName + ' ' + user.lastName}</td>
                            <td>${user.email}</td>
                            <td>${user.role}${user.organisationRole ? ' - ' + user.organisationRole : ''}</td>
                            <td><span class="badge ${user.isActive ? 'badge-success' : 'badge-danger'}">${user.isActive ? 'Actif' : 'Inactif'}</span></td>
                        </tr>
                    `;
                });
                html += '</tbody></table>';
            }
            
            document.getElementById('contentArea').innerHTML = html;
        }

        async function loadForms() {
            let endpoint = '/forms';
            if (currentRole === 'ORGANISATION') {
                endpoint += `?organisationId=${currentUser.organisationId}`;
            }
            
            const data = await apiCall(endpoint);
            let html = '<h2>📝 Formulaires</h2>';
            
            if (currentRole === 'ADMIN') {
                html += '<button class="btn" onclick="showCreateForm()" style="margin-bottom: 20px;">➕ Créer un formulaire</button>';
            }
            
            if (data.length === 0) {
                html += '<p>Aucun formulaire</p>';
            } else {
                html += '<table class="table"><thead><tr><th>Nom</th><th>Version</th><th>Secteur</th><th>Type</th><th>Statut</th><th>Actions</th></tr></thead><tbody>';
                data.forEach(form => {
                    html += `
                        <tr>
                            <td>${form.name}</td>
                            <td>${form.version}</td>
                            <td>${form.sector}</td>
                            <td>${form.formType}</td>
                            <td><span class="badge ${form.status === 'ONLINE' ? 'badge-success' : 'badge-warning'}">${form.status}</span></td>
                            <td><button class="btn btn-secondary" onclick="viewForm('${form.id}')">Voir</button></td>
                        </tr>
                    `;
                });
                html += '</tbody></table>';
            }
            
            document.getElementById('contentArea').innerHTML = html;
        }

        async function loadDocumentTypes() {
            const data = await apiCall('/documents/types');
            let html = '<h2>📄 Types de Documents</h2>';
            html += '<button class="btn" onclick="showCreateDocumentType()" style="margin-bottom: 20px;">➕ Créer un type de document</button>';
            
            if (data.length === 0) {
                html += '<p>Aucun type de document</p>';
            } else {
                html += '<table class="table"><thead><tr><th>Titre</th><th>Date expiration</th><th>Vérification identité</th><th>Statut</th><th>Actions</th></tr></thead><tbody>';
                data.forEach(docType => {
                    html += `
                        <tr>
                            <td>${docType.title}</td>
                            <td>${docType.hasExpirationDate ? 'Oui' : 'Non'}</td>
                            <td>${docType.isForIdentityVerification ? 'Oui' : 'Non'}</td>
                            <td><span class="badge ${docType.isActive ? 'badge-success' : 'badge-danger'}">${docType.isActive ? 'Actif' : 'Inactif'}</span></td>
                            <td><button class="btn btn-secondary" onclick="viewDocumentType('${docType.id}')">Voir</button></td>
                        </tr>
                    `;
                });
                html += '</tbody></table>';
            }
            
            document.getElementById('contentArea').innerHTML = html;
        }

        async function loadRequests() {
            let endpoint = '/requests';
            if (currentRole === 'CLIENT') {
                endpoint = '/users/archives';
            } else if (currentRole === 'ORGANISATION') {
                endpoint = `/organisations/${currentUser.organisationId}/requests`;
            }
            
            const data = await apiCall(endpoint);
            let html = '<h2>📋 Demandes</h2>';
            
            if (Array.isArray(data) && data.length === 0) {
                html += '<p>Aucune demande</p>';
            } else if (Array.isArray(data)) {
                html += '<table class="table"><thead><tr><th>Numéro</th><th>Formulaire</th><th>Client</th><th>Statut</th><th>Date</th><th>Actions</th></tr></thead><tbody>';
                data.forEach(request => {
                    html += `
                        <tr>
                            <td>${request.requestNumber || 'N/A'}</td>
                            <td>${request.formName || 'N/A'}</td>
                            <td>${request.clientName || 'N/A'}</td>
                            <td><span class="badge badge-info">${request.status}</span></td>
                            <td>${new Date(request.createdAt).toLocaleDateString()}</td>
                            <td><button class="btn btn-secondary" onclick="viewRequest('${request.id}')">Voir</button></td>

                    `;
                });
                html += '</tbody></table>';
            } else {
                html += '<p>Données non disponibles</p>';
            }
            
            document.getElementById('contentArea').innerHTML = html;
        }

        async function loadVerifications() {

            if (data.length === 0) {

                            <td><span class="badge badge-info">${verification.status}</span></td>

                            <td>${new Date(verification.submittedAt).toLocaleDateString()}</td>

                    <div style="background: #e0e0e0; height: 20px; border-radius: 10px; margin-top: 10px;">
                        <div style="background: #667eea; height: 100%; width: ${completion.completion}%; border-radius: 10px;"></div>
                    </div>
                    <p style="margin-top: 10px;"><strong>Documents requis:</strong> ${completion.requiredDocuments?.length || 0}</p>

        async function loadDocuments() {
            const data = await apiCall('/users/profile/documents');
            let html = '<h2>📄 Mes Documents</h2>';
            html += '<button class="btn" onclick="showUploadDocument()" style="margin-bottom: 20px;">➕ Uploader un document</button>';
            
            if (data.length === 0) {
                html += '<p>Aucun document uploadé</p>';
            } else {
                html += '<table class="table"><thead><tr><th>Type</th><th>Fichier</th><th>Statut</th><th>Date upload</th><th>Actions</th></tr></thead><tbody>';
                data.forEach(doc => {
                    html += `
                        <tr>
                            <td>${doc.type || 'N/A'}</td>
                            <td>${doc.fileName}</td>
                            <td><span class="badge ${doc.status === 'VALIDE' ? 'badge-success' : doc.status === 'REJETE' ? 'badge-danger' : 'badge-warning'}">${doc.status}</span></td>
                            <td>${new Date(doc.createdAt).toLocaleDateString()}</td>
                            <td><button class="btn btn-secondary" onclick="viewDocument('${doc.id}')">Voir</button></td>
                        </tr>
                    `;
                });
                html += '</tbody></table>';
            }
            
            document.getElementById('contentArea').innerHTML = html;

        async function loadSecurity() {
            const data = await apiCall('/security/settings');

                <h2>🔒 Paramètres de Sécurité</h2>

                    <h3>Configuration actuelle</h3>

                    <p><strong>Max tentatives:</strong> ${data.maxLoginAttempts}</p>
                    <p><strong>Durée verrouillage:</strong> ${data.lockoutDurationMinutes} minutes</p>
                    <p><strong>Vérification email requise:</strong> ${data.requireEmailVerification ? 'Oui' : 'Non'}</p>
                    <p><strong>Documents requis:</strong> ${data.requireDocumentsForRegistration ? 'Oui' : 'Non'}</p>
                    <p><strong>Documents requis (IDs):</strong> ${data.requiredDocumentsForRegistration?.join(', ') || 'Aucun'}</p>

        async function loadCreateRequest() {
            const forms = await apiCall('/forms?status=ONLINE');
            const organisations = await apiCall('/organisations');
            
            const html = `
                <h2>➕ Nouvelle Demande</h2>
                <form onsubmit="handleCreateRequest(event)">
                    <div class="form-group">
                        <label>Organisation</label>
                        <select id="requestOrganisation" required>
                            <option value="">Sélectionner...</option>
                            ${organisations.map(org => `<option value="${org.id}">${org.name}</option>`).join('')}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Formulaire</label>
                        <select id="requestForm" required>
                            <option value="">Sélectionner...</option>
                            ${forms.map(form => `<option value="${form.id}">${form.name}</option>`).join('')}
                        </select>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Nom bénéficiaire</label>
                            <input type="text" id="beneficiaryName" required>
                        </div>
                        <div class="form-group">
                            <label>Email bénéficiaire</label>
                            <input type="email" id="beneficiaryEmail" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Montant</label>
                        <input type="number" id="requestAmount" required>
                    </div>
                    <button type="submit" class="btn">Créer la demande</button>
                </form>
            `;
            
            document.getElementById('contentArea').innerHTML = html;
        }

        async function handleCreateRequest(event) {
            event.preventDefault();
            try {
                const data = {
                    organisationId: document.getElementById('requestOrganisation').value,
                    formId: document.getElementById('requestForm').value,
                    beneficiary: {
                        name: document.getElementById('beneficiaryName').value,
                        email: document.getElementById('beneficiaryEmail').value,
                    },
                    amount: parseFloat(document.getElementById('requestAmount').value),
                };
                
                await apiCall('/requests', {
                    method: 'POST',
                    body: JSON.stringify(data),
                });
                
                alert('Demande créée avec succès!');
                loadView('requests');
            } catch (error) {
                alert('Erreur: ' + error.message);
            }
        }
